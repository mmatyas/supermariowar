name: Build - Linux
on: workflow_call

jobs:
  linux:
    runs-on: ubuntu-24.04
    name: X11
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y
          cmake
          g++
          libsdl2-dev
          libsdl2-image-dev
          libsdl2-mixer-dev
          ninja-build
      - name: Version checks
        run: |
          sdl2-config --version
          cmake --version

      - name: Configure
        run: cmake -B build -G Ninja -DUSE_BUNDLED_ENET=ON -DUSE_BUNDLED_YAMLCPP=ON -DSMW_INSTALL_PORTABLE=ON

      - name: Build
        run: cmake --build build --verbose

      - name: Test
        run: ctest --test-dir build/tests --output-on-failure

      - name: Package
        run: |
          cmake --install build --prefix supermariowar --strip
          rm -rf supermariowar/include supermariowar/lib
          zip -9 -r "supermariowar_$(date +%F)_linux.zip" supermariowar

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: supermariowar_linux
          path: supermariowar_*_linux.zip
