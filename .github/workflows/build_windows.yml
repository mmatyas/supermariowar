name: Build - Windows
on: workflow_call

env:
  COMMON_CMAKE_ARGS: >
    -B build
    -G Ninja
    -DCMAKE_BUILD_TYPE=Release
    -DUSE_BUNDLED_ENET=ON
    -DUSE_BUNDLED_YAMLCPP=ON
    -DUSE_BUNDLED_ZLIB=ON
    -DSMW_INSTALL_PORTABLE=ON

jobs:
  mingw-cross:
    name: MinGW
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++-mingw-w64-x86-64-posix ninja-build
          curl -L https://github.com/mmatyas/supermariowar/releases/download/v2.0-beta.0/smwlibs-mingw64.tar.xz | tar xJf - -C /tmp/
          cmake --version

      - name: Configure
        run: cmake $COMMON_CMAKE_ARGS
          -DCMAKE_TOOLCHAIN_FILE=../.github/workflows/mingw_toolchain.cmake
          -DBUILD_TESTS=OFF
          -DSDL2_USE_MIXERX=ON
      - name: Build
        run: cmake --build build --verbose

      - name: Package
        run: |
          cmake --install build --prefix supermariowar --strip
          rm -rf supermariowar/include supermariowar/lib
          cp /usr/lib/gcc/x86_64-w64-mingw32/13-posix/{libgcc_s_seh-1,libstdc++-6}.dll supermariowar/
          cp /usr/x86_64-w64-mingw32/lib/libwinpthread-1.dll supermariowar/
          cp /tmp/smwlibs/bin/{SDL2,SDL2_image,SDL2_mixer_ext}.dll supermariowar/
          zip -9 -r "supermariowar_$(date +%F)_windows.zip" supermariowar

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: supermariowar_windows
          path: supermariowar_*_windows.zip

  msvc:
    name: MSVC
    runs-on: windows-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: ilammy/msvc-dev-cmd@v1
      - uses: mozilla/sccache-action@v0.0.9

      - name: Download dependencies
        run: |
          mkdir libs
          curl -L https://www.libsdl.org/release/SDL2-devel-2.32.10-VC.zip | tar -x --strip-components=1 -C libs
          curl -L https://www.libsdl.org/projects/SDL_image/release/SDL2_image-devel-2.8.8-VC.zip | tar -x --strip-components=1 -C libs
          curl -L https://www.libsdl.org/projects/SDL_mixer/release/SDL2_mixer-devel-2.8.1-VC.zip | tar -x --strip-components=1 -C libs

      - name: Configure
        shell: bash
        run: cmake $COMMON_CMAKE_ARGS
          -DCMAKE_PREFIX_PATH=libs
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build build --verbose --config Release --parallel

      - name: Test
        run: ctest --test-dir build/tests --output-on-failure --build-config Release

      - name: Package
        run: cmake --install build --prefix outdir --strip --config Release
